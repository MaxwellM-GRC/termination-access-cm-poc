name: Access Review (Continuous Monitoring)

# Runs the termination access review on a cadence and raises notifications when
# actionable exceptions (critical/high) are found. This workflow is EXPECTED to
# go red when exceptions exist -- that red scheduled run is itself the alert:
# GitHub emails the repo owner when a scheduled run on the default branch fails.
#
# Notification chain when critical/high findings are present:
#   1. Exception log + summary uploaded as a downloadable run artifact (evidence)
#   2. A rolling GitHub Issue (label: access-exception) is opened or commented on
#   3. Optional Slack message if the SLACK_WEBHOOK_URL secret is configured
#   4. The job fails, triggering GitHub's built-in email to the repo owner

on:
  schedule:
    # Every weekday at 07:00 UTC. In production this runs against fresh extracts.
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}      # allow manual runs from the Actions tab
  push:
    branches: [main]         # also run on merge to main to demonstrate the flow

permissions:
  contents: read
  issues: write              # required to open/comment the exception issue

jobs:
  access-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run access review
        id: review
        # Do not stop the job on a non-zero exit; later steps handle evidence and
        # alerting, then a final step re-asserts failure so the run goes red.
        continue-on-error: true
        run: |
          python -m src.main \
            --out exception_log.csv \
            --summary-json summary.json \
            --issue-md issue_body.md \
            --fail-on high

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: access-review-${{ github.run_id }}
          path: |
            exception_log.csv
            summary.json
            issue_body.md
          if-no-files-found: warn

      - name: Evaluate findings
        id: check
        if: always()
        run: |
          python - << 'PY' >> "$GITHUB_OUTPUT"
          import json
          d = json.load(open("summary.json"))
          c = d["counts_by_severity"]
          actionable = c["critical"] + c["high"]
          print(f"actionable={'true' if actionable else 'false'}")
          print(f"count={actionable}")
          PY

      - name: Open or update exception issue
        if: always() && steps.check.outputs.actionable == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue_body.md', 'utf8');
            const summary = JSON.parse(fs.readFileSync('summary.json', 'utf8'));
            const label = 'access-exception';
            const { owner, repo } = context.repo;

            // Owners are configured per system as @user or @org/team. Only plain
            // @user handles that are repo collaborators can be assignees; the
            // @mentions in the issue body notify everyone either way. Assignment
            // is attempted separately and best-effort, so an unknown handle (e.g.
            // a placeholder) can never block the issue itself.
            const assignees = (summary.owners_to_notify || [])
              .map(o => o.owner)
              .filter(h => h && h.startsWith('@') && !h.includes('/'))
              .map(h => h.slice(1));

            async function tryAssign(issue_number) {
              if (!assignees.length) return;
              try {
                await github.rest.issues.addAssignees({ owner, repo, issue_number, assignees });
              } catch (e) {
                core.warning(`Could not assign ${assignees.join(', ')}: ${e.message}`);
              }
            }

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 1,
            });

            if (existing.data.length) {
              const number = existing.data[0].number;
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
              await tryAssign(number);
              core.info(`Commented on existing exception issue #${number}`);
            } else {
              const today = new Date().toISOString().slice(0, 10);
              const res = await github.rest.issues.create({
                owner, repo,
                title: `Access exceptions detected (${today})`,
                body,
                labels: [label],
              });
              await tryAssign(res.data.number);
              core.info(`Opened exception issue #${res.data.number}`);
            }

      - name: Notify Slack
        if: always() && steps.check.outputs.actionable == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          COUNT="${{ steps.check.outputs.count }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          payload=$(python - "$COUNT" "$RUN_URL" << 'PY'
          import json, sys
          count, url = sys.argv[1], sys.argv[2]
          text = (f":rotating_light: Termination access review found {count} "
                  f"actionable exception(s) (critical/high).\n{url}")
          print(json.dumps({"text": text}))
          PY
          )
          curl -sS -X POST -H 'Content-Type: application/json' \
            -d "$payload" "$SLACK_WEBHOOK_URL"

      - name: Fail run if actionable exceptions exist
        if: always() && steps.check.outputs.actionable == 'true'
        run: |
          echo "Actionable exceptions present -- failing the run to alert."
          exit 1
