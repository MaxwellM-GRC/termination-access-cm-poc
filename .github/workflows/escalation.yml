name: Exception Escalation

# Ages open access-exception issues and escalates any that have stayed open past
# the remediation SLA (config.yaml -> remediation.issue_sla_days). Escalation =
# an `escalated` label plus a comment tagging the escalation owner. This gives
# the control an exception-aging trail: detection -> assignment -> escalation.

on:
  schedule:
    # Daily on weekdays at 08:00 UTC, an hour after the access review.
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  escalate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read escalation policy
        id: policy
        run: |
          python - << 'PY' >> "$GITHUB_OUTPUT"
          import yaml
          r = (yaml.safe_load(open("config.yaml")) or {}).get("remediation", {})
          print(f"sla_days={r.get('issue_sla_days', 5)}")
          print(f"owner={r.get('escalation_owner', '')}")
          PY

      - name: Escalate overdue exceptions
        uses: actions/github-script@v7
        env:
          SLA_DAYS: ${{ steps.policy.outputs.sla_days }}
          ESCALATION_OWNER: ${{ steps.policy.outputs.owner }}
        with:
          script: |
            const slaDays = parseInt(process.env.SLA_DAYS || '5', 10);
            const owner = (process.env.ESCALATION_OWNER || '').trim();
            const { owner: repoOwner, repo } = context.repo;
            const label = 'access-exception';
            const escalatedLabel = 'escalated';

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: repoOwner, repo, state: 'open', labels: label, per_page: 100,
            });

            const now = Date.now();
            let escalated = 0;
            for (const issue of issues) {
              if (issue.pull_request) continue;  // listForRepo also returns PRs
              const ageDays = Math.floor(
                (now - new Date(issue.created_at).getTime()) / 86400000
              );
              const already = (issue.labels || []).some(
                l => (l.name || l) === escalatedLabel
              );
              if (ageDays > slaDays && !already) {
                await github.rest.issues.addLabels({
                  owner: repoOwner, repo, issue_number: issue.number,
                  labels: [escalatedLabel],
                });
                const tag = owner ? ` Escalating to ${owner}.` : '';
                await github.rest.issues.createComment({
                  owner: repoOwner, repo, issue_number: issue.number,
                  body: `:arrow_double_up: **Escalation:** open ${ageDays} day(s), `
                      + `past the ${slaDays}-day remediation SLA.${tag}`,
                });
                escalated++;
                core.info(`Escalated issue #${issue.number} (open ${ageDays}d)`);
              }
            }
            core.info(`Escalation run complete. ${escalated} issue(s) escalated.`);
