name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest -q

      - name: Smoke-test the CLI
        # --fail-on none: this step validates the tool runs; it must not turn red
        # just because the sample data contains findings. The scheduled
        # access-review workflow is what alerts on findings.
        run: python -m src.main --fail-on none
